name: Deploy API Edge

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @felix-travel/api-edge typecheck

      - name: Build
        run: pnpm --filter @felix-travel/api-edge build
        continue-on-error: true

      - name: Provision and resolve resource IDs
        run: |
          API="https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          AUTH="Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"

          # --- D1 Database ---
          DB_ID=$(curl -sf "$API/d1/database" -H "$AUTH" \
            | jq -r '.result[] | select(.name == "felix-travel-db") | .uuid')
          if [ -z "$DB_ID" ] || [ "$DB_ID" = "null" ]; then
            echo "D1 database not found — creating..."
            DB_ID=$(curl -sf -X POST "$API/d1/database" \
              -H "$AUTH" -H "Content-Type: application/json" \
              -d '{"name":"felix-travel-db"}' \
              | jq -r '.result.uuid')
          fi
          echo "D1 database ID: $DB_ID"
          sed -i "s/YOUR_D1_DATABASE_ID/$DB_ID/" apps/api-edge/wrangler.toml

          # --- KV Namespaces ---
          KV_JSON=$(curl -sf "$API/storage/kv/namespaces?per_page=100" -H "$AUTH")

          ensure_kv() {
            local binding="$1" placeholder="$2"
            local id=$(echo "$KV_JSON" | jq -r ".result[] | select(.title | test(\"$binding\")) | .id" | head -1)
            if [ -z "$id" ] || [ "$id" = "null" ]; then
              echo "KV $binding not found — creating..."
              id=$(curl -sf -X POST "$API/storage/kv/namespaces" \
                -H "$AUTH" -H "Content-Type: application/json" \
                -d "{\"title\":\"felix-travel-api-$binding\"}" \
                | jq -r '.result.id')
            fi
            if [ -n "$id" ] && [ "$id" != "null" ]; then
              echo "KV $binding → $id"
              sed -i "s/$placeholder/$id/" apps/api-edge/wrangler.toml
            else
              echo "::warning::Failed to resolve KV namespace for $binding"
            fi
          }

          ensure_kv CACHE_KV YOUR_CACHE_KV_ID
          ensure_kv IDEMPOTENCY_KV YOUR_IDEMPOTENCY_KV_ID
          ensure_kv TOKEN_CACHE_KV YOUR_TOKEN_CACHE_KV_ID
          ensure_kv REPLAY_PROTECTION_KV YOUR_REPLAY_PROTECTION_KV_ID
          ensure_kv RATE_LIMIT_KV YOUR_RATE_LIMIT_KV_ID
          ensure_kv POLICY_CACHE_KV YOUR_POLICY_CACHE_KV_ID
          ensure_kv TRUSTED_DEVICE_KV YOUR_TRUSTED_DEVICE_KV_ID
          ensure_kv RISK_CACHE_KV YOUR_RISK_CACHE_KV_ID

          # --- Queues ---
          QUEUES=(
            felix-travel-outbound-webhooks
            felix-travel-reconciliation
            felix-travel-notifications
            felix-travel-approval
            felix-travel-payment
            felix-travel-payout
          )
          EXISTING_QUEUES=$(curl -sf "$API/queues?per_page=100" -H "$AUTH" | jq -r '.result[].queue_name // empty' 2>/dev/null || echo "")
          for Q in "${QUEUES[@]}"; do
            if echo "$EXISTING_QUEUES" | grep -qx "$Q"; then
              echo "Queue $Q already exists"
            else
              echo "Creating queue: $Q"
              curl -sf -X POST "$API/queues" \
                -H "$AUTH" -H "Content-Type: application/json" \
                -d "{\"queue_name\":\"$Q\"}" > /dev/null
            fi
          done

          # --- R2 Bucket ---
          R2_EXISTS=$(curl -sf "$API/r2/buckets" -H "$AUTH" | jq -r '.result.buckets[]? | select(.name == "felix-travel-media") | .name' 2>/dev/null || echo "")
          if [ -z "$R2_EXISTS" ]; then
            echo "Creating R2 bucket: felix-travel-media"
            curl -sf -X POST "$API/r2/buckets" \
              -H "$AUTH" -H "Content-Type: application/json" \
              -d '{"name":"felix-travel-media"}' > /dev/null
          else
            echo "R2 bucket felix-travel-media already exists"
          fi

      - name: Apply D1 migrations
        run: |
          cd apps/api-edge
          npx wrangler d1 migrations apply felix-travel-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set worker secrets
        run: |
          cd apps/api-edge
          set_secret() {
            local name="$1"; local value="$2"
            if [ -n "$value" ]; then
              echo "$value" | npx wrangler secret put "$name"
            fi
          }
          set_secret JWT_PRIVATE_KEY "${{ secrets.JWT_PRIVATE_KEY }}"
          set_secret JWT_PUBLIC_KEY "${{ secrets.JWT_PUBLIC_KEY }}"
          set_secret INTERNAL_EVENT_SIGNING_SECRET "${{ secrets.INTERNAL_EVENT_SIGNING_SECRET }}"
          set_secret CSRF_SECRET "${{ secrets.CSRF_SECRET }}"
          set_secret ENCRYPTION_KEY "${{ secrets.ENCRYPTION_KEY }}"
          set_secret MFA_ENCRYPTION_KEY "${{ secrets.MFA_ENCRYPTION_KEY }}"
          set_secret TINGG_CLIENT_ID "${{ secrets.TINGG_CLIENT_ID }}"
          set_secret TINGG_CLIENT_SECRET "${{ secrets.TINGG_CLIENT_SECRET }}"
          set_secret TINGG_ENGAGE_USERNAME "${{ secrets.TINGG_ENGAGE_USERNAME }}"
          set_secret TINGG_ENGAGE_PASSWORD "${{ secrets.TINGG_ENGAGE_PASSWORD }}"
          set_secret RESEND_API_KEY "${{ secrets.RESEND_API_KEY }}"
          set_secret AT_API_KEY "${{ secrets.AT_API_KEY }}"
          set_secret AT_USERNAME "${{ secrets.AT_USERNAME }}"
          set_secret SENTRY_DSN "${{ secrets.SENTRY_DSN }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: |
          cd apps/api-edge
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
