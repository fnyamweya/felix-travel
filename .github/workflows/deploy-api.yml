name: Deploy API Edge

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @felix-travel/api-edge typecheck

      - name: Build
        run: pnpm --filter @felix-travel/api-edge build
        continue-on-error: true

      - name: Apply D1 migrations
        run: |
          cd apps/api-edge
          npx wrangler d1 migrations apply ${{ secrets.CF_D1_DATABASE_ID }} --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set worker secrets
        run: |
          cd apps/api-edge
          set_secret() {
            local name="$1"; local value="$2"
            if [ -n "$value" ]; then
              echo "$value" | npx wrangler secret put "$name"
            fi
          }
          set_secret JWT_PRIVATE_KEY "${{ secrets.JWT_PRIVATE_KEY }}"
          set_secret JWT_PUBLIC_KEY "${{ secrets.JWT_PUBLIC_KEY }}"
          set_secret INTERNAL_EVENT_SIGNING_SECRET "${{ secrets.INTERNAL_EVENT_SIGNING_SECRET }}"
          set_secret CSRF_SECRET "${{ secrets.CSRF_SECRET }}"
          set_secret ENCRYPTION_KEY "${{ secrets.ENCRYPTION_KEY }}"
          set_secret MFA_ENCRYPTION_KEY "${{ secrets.MFA_ENCRYPTION_KEY }}"
          set_secret TINGG_CLIENT_ID "${{ secrets.TINGG_CLIENT_ID }}"
          set_secret TINGG_CLIENT_SECRET "${{ secrets.TINGG_CLIENT_SECRET }}"
          set_secret TINGG_ENGAGE_USERNAME "${{ secrets.TINGG_ENGAGE_USERNAME }}"
          set_secret TINGG_ENGAGE_PASSWORD "${{ secrets.TINGG_ENGAGE_PASSWORD }}"
          set_secret RESEND_API_KEY "${{ secrets.RESEND_API_KEY }}"
          set_secret AT_API_KEY "${{ secrets.AT_API_KEY }}"
          set_secret AT_USERNAME "${{ secrets.AT_USERNAME }}"
          set_secret SENTRY_DSN "${{ secrets.SENTRY_DSN }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: |
          cd apps/api-edge
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
