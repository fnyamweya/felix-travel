name: Deploy API Edge

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @felix-travel/api-edge typecheck

      - name: Build
        run: pnpm --filter @felix-travel/api-edge build
        continue-on-error: true

      - name: Resolve D1 database ID
        run: |
          DB_ID=$(npx wrangler d1 list --json | jq -r '.[] | select(.name == "felix-travel-db") | .uuid')
          if [ -z "$DB_ID" ] || [ "$DB_ID" = "null" ]; then
            echo "::error::D1 database 'felix-travel-db' not found. Run the Setup Infrastructure workflow first."
            exit 1
          fi
          echo "Resolved D1 database ID: $DB_ID"
          sed -i "s/YOUR_D1_DATABASE_ID/$DB_ID/" apps/api-edge/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Resolve KV namespace IDs
        run: |
          KV_JSON=$(npx wrangler kv namespace list --json)
          patch_kv() {
            local binding="$1" placeholder="$2"
            local id=$(echo "$KV_JSON" | jq -r ".[] | select(.title | test(\"$binding\")) | .id" | head -1)
            if [ -n "$id" ] && [ "$id" != "null" ]; then
              echo "Resolved $binding → $id"
              sed -i "s/$placeholder/$id/" apps/api-edge/wrangler.toml
            else
              echo "::warning::KV namespace for $binding not found"
            fi
          }
          patch_kv CACHE_KV YOUR_CACHE_KV_ID
          patch_kv IDEMPOTENCY_KV YOUR_IDEMPOTENCY_KV_ID
          patch_kv TOKEN_CACHE_KV YOUR_TOKEN_CACHE_KV_ID
          patch_kv REPLAY_PROTECTION_KV YOUR_REPLAY_PROTECTION_KV_ID
          patch_kv RATE_LIMIT_KV YOUR_RATE_LIMIT_KV_ID
          patch_kv POLICY_CACHE_KV YOUR_POLICY_CACHE_KV_ID
          patch_kv TRUSTED_DEVICE_KV YOUR_TRUSTED_DEVICE_KV_ID
          patch_kv RISK_CACHE_KV YOUR_RISK_CACHE_KV_ID
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations
        run: |
          cd apps/api-edge
          npx wrangler d1 migrations apply felix-travel-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set worker secrets
        run: |
          cd apps/api-edge
          set_secret() {
            local name="$1"; local value="$2"
            if [ -n "$value" ]; then
              echo "$value" | npx wrangler secret put "$name"
            fi
          }
          set_secret JWT_PRIVATE_KEY "${{ secrets.JWT_PRIVATE_KEY }}"
          set_secret JWT_PUBLIC_KEY "${{ secrets.JWT_PUBLIC_KEY }}"
          set_secret INTERNAL_EVENT_SIGNING_SECRET "${{ secrets.INTERNAL_EVENT_SIGNING_SECRET }}"
          set_secret CSRF_SECRET "${{ secrets.CSRF_SECRET }}"
          set_secret ENCRYPTION_KEY "${{ secrets.ENCRYPTION_KEY }}"
          set_secret MFA_ENCRYPTION_KEY "${{ secrets.MFA_ENCRYPTION_KEY }}"
          set_secret TINGG_CLIENT_ID "${{ secrets.TINGG_CLIENT_ID }}"
          set_secret TINGG_CLIENT_SECRET "${{ secrets.TINGG_CLIENT_SECRET }}"
          set_secret TINGG_ENGAGE_USERNAME "${{ secrets.TINGG_ENGAGE_USERNAME }}"
          set_secret TINGG_ENGAGE_PASSWORD "${{ secrets.TINGG_ENGAGE_PASSWORD }}"
          set_secret RESEND_API_KEY "${{ secrets.RESEND_API_KEY }}"
          set_secret AT_API_KEY "${{ secrets.AT_API_KEY }}"
          set_secret AT_USERNAME "${{ secrets.AT_USERNAME }}"
          set_secret SENTRY_DSN "${{ secrets.SENTRY_DSN }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: |
          cd apps/api-edge
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
