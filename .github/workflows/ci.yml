name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          cache: true

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Upload deps artifact
        uses: actions/upload-artifact@v4
        with:
          name: deps
          path: |
            node_modules
            .pnpm-store
          retention-days: 1

  typecheck:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          cache: true

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Download deps artifact
        uses: actions/download-artifact@v4
        with:
          name: deps

      - name: Typecheck
        run: pnpm turbo typecheck

  test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          cache: true

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Download deps artifact
        uses: actions/download-artifact@v4
        with:
          name: deps

      - name: Test
        run: pnpm turbo test

  lint:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          cache: true

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Download deps artifact
        uses: actions/download-artifact@v4
        with:
          name: deps

      - name: Lint
        run: pnpm turbo lint
        continue-on-error: true

  migration-check:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          cache: true

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Download deps artifact
        uses: actions/download-artifact@v4
        with:
          name: deps

      - name: Check migration files
        run: |
          COUNT=$(ls packages/db/src/migrations/*.sql | wc -l)
          echo "Migration files found: $COUNT"
