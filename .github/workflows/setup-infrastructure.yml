name: Setup Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Wrangler environment (leave empty for top-level)'
        required: false
        default: ''
      skip_secrets:
        description: 'Skip setting worker secrets'
        required: false
        type: boolean
        default: false

jobs:
  provision:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create D1 database
        run: npx wrangler d1 create felix-travel-db 2>&1 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create KV namespaces
        run: |
          KV_NAMES=(
            CACHE_KV
            IDEMPOTENCY_KV
            TOKEN_CACHE_KV
            REPLAY_PROTECTION_KV
            RATE_LIMIT_KV
            POLICY_CACHE_KV
            TRUSTED_DEVICE_KV
            RISK_CACHE_KV
          )
          ENV_FLAG="${{ inputs.environment && format('--env {0}', inputs.environment) || '' }}"
          for KV in "${KV_NAMES[@]}"; do
            echo "Creating KV namespace: $KV"
            npx wrangler kv namespace create "$KV" $ENV_FLAG 2>&1 || true
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create R2 bucket
        run: npx wrangler r2 bucket create felix-travel-media 2>&1 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create Queues
        run: |
          QUEUES=(
            felix-travel-outbound-webhooks
            felix-travel-reconciliation
            felix-travel-notifications
            felix-travel-approval
            felix-travel-payment
            felix-travel-payout
          )
          for Q in "${QUEUES[@]}"; do
            echo "Creating queue: $Q"
            npx wrangler queues create "$Q" 2>&1 || true
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create Pages projects
        run: |
          npx wrangler pages project create felix-travel-web-customer --production-branch main 2>&1 || true
          npx wrangler pages project create felix-travel-web-dashboard --production-branch main 2>&1 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set worker secrets
        if: ${{ !inputs.skip_secrets }}
        run: |
          cd apps/api-edge
          ENV_FLAG="${{ inputs.environment && format('--env {0}', inputs.environment) || '' }}"

          set_secret() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              echo "$value" | npx wrangler secret put "$name" $ENV_FLAG
              echo "✓ Set secret: $name"
            else
              echo "⚠ Skipped: $name (not set)"
            fi
          }

          # Required secrets
          set_secret JWT_PRIVATE_KEY "${{ secrets.JWT_PRIVATE_KEY }}"
          set_secret JWT_PUBLIC_KEY "${{ secrets.JWT_PUBLIC_KEY }}"
          set_secret INTERNAL_EVENT_SIGNING_SECRET "${{ secrets.INTERNAL_EVENT_SIGNING_SECRET }}"
          set_secret CSRF_SECRET "${{ secrets.CSRF_SECRET }}"
          set_secret ENCRYPTION_KEY "${{ secrets.ENCRYPTION_KEY }}"
          set_secret MFA_ENCRYPTION_KEY "${{ secrets.MFA_ENCRYPTION_KEY }}"
          set_secret TINGG_CLIENT_ID "${{ secrets.TINGG_CLIENT_ID }}"
          set_secret TINGG_CLIENT_SECRET "${{ secrets.TINGG_CLIENT_SECRET }}"
          set_secret TINGG_ENGAGE_USERNAME "${{ secrets.TINGG_ENGAGE_USERNAME }}"
          set_secret TINGG_ENGAGE_PASSWORD "${{ secrets.TINGG_ENGAGE_PASSWORD }}"

          # Optional secrets
          set_secret RESEND_API_KEY "${{ secrets.RESEND_API_KEY }}"
          set_secret AT_API_KEY "${{ secrets.AT_API_KEY }}"
          set_secret AT_USERNAME "${{ secrets.AT_USERNAME }}"
          set_secret SENTRY_DSN "${{ secrets.SENTRY_DSN }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set worker variables
        run: |
          cd apps/api-edge
          ENV_FLAG="${{ inputs.environment && format('--env {0}', inputs.environment) || '' }}"

          set_var() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              echo "$value" | npx wrangler secret put "$name" $ENV_FLAG
              echo "✓ Set var: $name"
            fi
          }

          # Core
          set_var APP_ENV "${{ vars.APP_ENV }}"
          set_var APP_NAME "${{ vars.APP_NAME }}"
          set_var APP_BASE_URL "${{ vars.APP_BASE_URL }}"
          set_var CUSTOMER_APP_URL "${{ vars.CUSTOMER_APP_URL }}"
          set_var DASHBOARD_APP_URL "${{ vars.DASHBOARD_APP_URL }}"
          set_var API_BASE_URL "${{ vars.API_BASE_URL }}"

          # Auth
          set_var JWT_ISSUER "${{ vars.JWT_ISSUER }}"
          set_var JWT_AUDIENCE "${{ vars.JWT_AUDIENCE }}"
          set_var SESSION_COOKIE_DOMAIN "${{ vars.SESSION_COOKIE_DOMAIN }}"
          set_var SESSION_COOKIE_SECURE "${{ vars.SESSION_COOKIE_SECURE }}"

          # Email
          set_var EMAIL_PROVIDER "${{ vars.EMAIL_PROVIDER }}"
          set_var EMAIL_FROM "${{ vars.EMAIL_FROM }}"

          # Tingg
          set_var TINGG_ENVIRONMENT "${{ vars.TINGG_ENVIRONMENT }}"
          set_var TINGG_BASE_URL "${{ vars.TINGG_BASE_URL }}"
          set_var TINGG_SERVICE_CODE "${{ vars.TINGG_SERVICE_CODE }}"
          set_var TINGG_PAYOUT_SERVICE_CODE "${{ vars.TINGG_PAYOUT_SERVICE_CODE }}"
          set_var TINGG_COLLECTION_COUNTRY_CODE "${{ vars.TINGG_COLLECTION_COUNTRY_CODE }}"
          set_var TINGG_COLLECTION_CURRENCY_CODE "${{ vars.TINGG_COLLECTION_CURRENCY_CODE }}"
          set_var TINGG_CALLBACK_CHECKOUT_URL "${{ vars.TINGG_CALLBACK_CHECKOUT_URL }}"
          set_var TINGG_CALLBACK_PAYOUT_URL "${{ vars.TINGG_CALLBACK_PAYOUT_URL }}"
          set_var TINGG_SUCCESS_REDIRECT_URL "${{ vars.TINGG_SUCCESS_REDIRECT_URL }}"
          set_var TINGG_FAIL_REDIRECT_URL "${{ vars.TINGG_FAIL_REDIRECT_URL }}"

          # Storage
          set_var R2_PUBLIC_BASE_URL "${{ vars.R2_PUBLIC_BASE_URL }}"

          # Operations
          set_var LOG_LEVEL "${{ vars.LOG_LEVEL }}"
          set_var ENABLE_REQUEST_LOGGING "${{ vars.ENABLE_REQUEST_LOGGING }}"
          set_var FEATURE_ENABLE_EMAIL_NOTIFICATIONS "${{ vars.FEATURE_ENABLE_EMAIL_NOTIFICATIONS }}"
          set_var FEATURE_ENABLE_SMS_NOTIFICATIONS "${{ vars.FEATURE_ENABLE_SMS_NOTIFICATIONS }}"

          # Observability
          set_var SENTRY_ENVIRONMENT "${{ vars.SENTRY_ENVIRONMENT }}"
          set_var OTEL_EXPORT_ENABLED "${{ vars.OTEL_EXPORT_ENABLED }}"
          set_var OTEL_EXPORTER_ENDPOINT "${{ vars.OTEL_EXPORTER_ENDPOINT }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "## Infrastructure Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Resources created (or already exist):" >> $GITHUB_STEP_SUMMARY
          echo "- 1x D1 database" >> $GITHUB_STEP_SUMMARY
          echo "- 8x KV namespaces" >> $GITHUB_STEP_SUMMARY
          echo "- 1x R2 bucket" >> $GITHUB_STEP_SUMMARY
          echo "- 6x Queues" >> $GITHUB_STEP_SUMMARY
          echo "- 2x Pages projects" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next step:** Update \`wrangler.toml\` with the resource IDs from the logs above, then run the deploy workflows." >> $GITHUB_STEP_SUMMARY
